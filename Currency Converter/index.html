<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter-card">
        <h2 class="card-title">Currency Converter</h2>
        <p class="rate-ticker">Fetching latest rate…</p>

        <div class="field">
            <label for="amount">Amount</label>
            <input type="number" id="amount" class="amount-input" value="1" min="0" step="any">
        </div>

        <div class="currency-row">
            <div class="field">
                <label for="from">From</label>
                <select id="from" class="from-currency"></select>
            </div>

            <button class="swap-btn" type="button" aria-label="Swap currencies">⇄</button>

            <div class="field">
                <label for="to">To</label>
                <select id="to" class="to-currency"></select>
            </div>
        </div>

        <button class="convert-btn">Convert</button>

        <p class="result"></p>
        <p class="last-updated"></p>
        <p class="attribution">Rates by <a href="https://www.exchangerate-api.com" target="_blank" rel="noopener">ExchangeRate-API</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
